<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register</title>
</head>
<style>
body {
    font-family: Arial, sans-serif;
    background-color: #f5f5f5;

}

.container {
    width: 350px;
    margin: 80px auto;
    padding: 25px;
    background: white;
    border-radius: 10px;
    box-shadow: 0px 0px 10px rgba(0,0,0,0.1);
}

h2 {
    text-align: center;
    margin-bottom: 20px;
}

label {
    display: block;
    margin-top: 10px;
    font-weight: bold;
}

input, select {
    width: 100%;
    padding: 8px;
    margin-top: 5px;
    border: 1px solid #ccc;
    border-radius: 5px;
}

button {
    width: 100%;
    margin-top: 15px;
    padding: 10px;
    background-color: #007BFF;
    color: white;
    border: none;
    border-radius: 5px;
    cursor: pointer;
}

button:hover {
    background-color: #0056b3;
}
</style>

<body>
    <div class=".container">
    <h2>Welcome To Register...!! </h2>

    <form action="http://localhost:8080/courses/register" method="post">

        <label for="name">Enter Name</label>
        <input type="text" name="Name" id="" placeholder="Enter You Name" required><br><br>

        <label for="email">Enter Email</label>
        <input type="email" name="EmailId" id="" placeholder="Enter Your Email" required><br><br>

        <label for="coursename">Choose a Course</label>
        <select name="CourseName" id="course" required>
            <option value="Java">Java</option>
            <option value="Python">Python</option>
            <option value="Full Stack Devloper">Full Stack Devlpoer</option>
            <option value="UI/UX">UI/UX</option>
            <option value="Data Science">Data Science</option>
        </select><br><br>

        <button type="submit">Submit</button>

    </form>
    </div>

    <script>
        
    </script>
</body>
</html>
